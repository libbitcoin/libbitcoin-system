name: Continuous Integration

on: [ pull_request, push, workflow_dispatch ]

jobs:

  gnu:
    strategy:
      fail-fast: false

      matrix:
        include:
          - image: macos-latest
            config: "release"
            link: "dynamic"
            cc: "clang"
            cxx: "clang++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

          - image: macos-latest
            config: "release"
            link: "static"
            cc: "clang"
            cxx: "clang++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

          - image: ubuntu-24.04
            config: "debug"
            link: "dynamic"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

          - image: ubuntu-24.04
            config: "release"
            link: "static"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

          - image: ubuntu-24.04
            config: "release"
            link: "dynamic"
            cc: "gcc-12"
            cxx: "g++-12"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

          - image: ubuntu-24.04
            config: "debug"
            link: "static"
            cc: "gcc"
            cxx: "g++"
            flags: "--coverage -fprofile-update=atomic"
            coverage: "lcov"
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: "--enable-isystem"

    runs-on: ${{ matrix.image }}

    env:
      CC: '${{ matrix.cc }}'
      CXX: '${{ matrix.cxx }}'
      CFLAGS: '${{ matrix.flags }}'
      CXXFLAGS: '${{ matrix.flags }}'

    steps:
      - name: Get branch name
        id: get-branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository [libbitcoin-system]
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-system'
          repository: ${{ github.repository }}

      - name: Prepare toolchain [linux]
        if: ${{ startsWith(matrix.image, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install git build-essential autoconf automake libtool pkg-config ${{ matrix.package || '' }}
          if [[ "${{ matrix.coverage }}" == "lcov" ]]; then
              sudo apt-get install lcov
          fi

      - name: Prepare toolchain [macos]
        if: ${{ startsWith(matrix.image, 'macos') }}
        shell: bash
        run: |
          brew install autoconf automake libtool ${{ matrix.package || '' }}
          if [[ -n "${{ matrix.llvm }}" ]]; then
              echo "PATH=/opt/homebrew/opt/${{ matrix.llvm }}/bin:${PATH}" >> $GITHUB_ENV
          fi

      - name: Environmental Computation
        shell: bash
        run: |
          if [[ "${{ matrix.link }}" == "dynamic" ]]; then
              echo "LDFLAGS=-Wl,-rpath,${{ github.workspace }}/prefix/lib" >> $GITHUB_ENV
          fi

      - name: Execute installation
        shell: bash
        working-directory: 'libbitcoin-system'
        run: >
          ./builds/gnu/install-gnu.sh
          --build-use-local-src
          --build-src-dir="${{ github.workspace }}"
          --prefix="${{ github.workspace }}/prefix"
          --build-post-install-clean
          --build-obj-dir="obj"
          --build-obj-dir-relative
          --build-config="${{ matrix.config }}"
          --build-link="${{ matrix.link }}"
          ${{ matrix.boost }}
          ${{ matrix.secp256k1 }}
          ${{ matrix.options }}

      - name: Coverage calculation
        if: ${{ matrix.coverage == 'lcov' }}
        shell: bash
        working-directory: 'libbitcoin-system'
        run: |
          lcov --ignore-errors version,gcov,mismatch,mismatch --directory . --capture --output-file coverage.info
          lcov --ignore-errors unused --remove coverage.info "${{ github.workspace }}/prefix/*" "${{ github.workspace }}/libbitcoin-system/examples/*" "${{ github.workspace }}/libbitcoin-system/test/*" "${{ github.workspace }}/libbitcoin-system/src/wallet/address/qrencode/*" --output-file coverage.info

      - name: Coveralls.io upload
        if: ${{ matrix.coverage == 'lcov' }}
        uses: coverallsapp/github-action@v2.3.6
        with:
          format: lcov
          files: "libbitcoin-system/coverage.info"
          github-token: ${{ secrets.github_token }}

      - name: Test artifact collection
        if: failure()
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -e "libbitcoin-system/obj/Testing/Temporary/LastTest.log" ]]; then
            cp "libbitcoin-system/obj/Testing/Temporary/LastTest.log" libbitcoin-system-LastTest.errors"
          fi
          if [[ -e "libbitcoin-system/obj/test-suite.log" ]]; then
            cp "libbitcoin-system/obj/test-suite.log" libbitcoin-system-test-suite.errors"
          fi
          if [[ -e "libbitcoin-system/obj/test.log" ]]; then
            cp "libbitcoin-system/obj/test.log" libbitcoin-system-test.errors"
          fi

      - name: Test artifact upload
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: testlogs
          path: ${{ github.workspace }}/*.errors
          retention-days: 1
          if-no-files-found: warn

