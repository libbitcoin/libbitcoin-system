  presets:
    strategy:
      fail-fast: false

      matrix:
        include:
          - image: ubuntu-24.04
            preset: "nix-gnu-debug-shared"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            preset: "nix-gnu-release-static"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            preset: "nix-gnu-release-shared"
            cc: "gcc-12"
            cxx: "g++-12"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

    runs-on: ${{ matrix.image }}

    env:
      CC: '${{ matrix.cc }}'
      CXX: '${{ matrix.cxx }}'
      CFLAGS: '${{ matrix.flags }}'
      CXXFLAGS: '${{ matrix.flags }}'

    steps:
      - name: Get branch name
        id: get-branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository [libbitcoin-system]
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: 'libbitcoin-system'
          repository: ${{ github.repository }}

      - name: Prepare toolchain [linux]
        if: ${{ startsWith(matrix.image, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install git build-essential autoconf automake libtool pkg-config ${{ matrix.package || '' }}
          if [[ "${{ matrix.coverage }}" == "lcov" ]]; then
              sudo apt-get install lcov
          fi

      - name: Prepare toolchain [macos]
